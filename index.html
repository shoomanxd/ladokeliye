<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3D1C02" />
  <title>Double Touch For Surprise 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cocoa: #3D1C02;
      --choc-dark: #7B3F00;
      --choc-mid: #A0522D;
      --choc-light: #C68642;
      --cream: #FFF8F0;
      --blush: #FFD6D6;
      --frosting: #FDEBD0;
      --text-dark: #2C1001;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--cocoa);
      font-family: 'Nunito', sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── SCREEN 1: LANDING ─── */
    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #5C2A06 0%, var(--cocoa) 70%);
      z-index: 10;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #landing.hidden {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }

    .landing-emoji {
      font-size: clamp(60px, 18vw, 100px);
      animation: floatBob 3s ease-in-out infinite;
      margin-bottom: 24px;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5));
    }

    .landing-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(26px, 7vw, 48px);
      color: var(--frosting);
      text-align: center;
      line-height: 1.3;
      padding: 0 24px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }

    .landing-sub {
      font-size: clamp(13px, 3.5vw, 17px);
      color: var(--choc-light);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* floating particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: drift linear infinite;
    }

    @keyframes drift {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.2; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    @keyframes floatBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }

    /* double tap ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,200,120,0.3);
      transform: scale(0);
      animation: rippleOut 0.6s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleOut {
      to { transform: scale(6); opacity: 0; }
    }

    /* ─── SCREEN 2: CAKE ─── */
    #cake-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #1a0a00 0%, #2C1001 40%, #3D1C02 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(20px, 4vh);
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease 0.3s;
    }

    #cake-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .sorry-text-top {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(14px, 4vw, 20px);
      color: var(--choc-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeSlideDown 0.6s ease 0.9s forwards;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── CAKE SVG WRAPPER ─── */
    .cake-wrap {
      width: min(88vw, 380px);
      position: relative;
      flex-shrink: 0;
      opacity: 0;
      animation: cakePop 0.7s cubic-bezier(0.34,1.56,0.64,1) 1.1s forwards;
    }

    @keyframes cakePop {
      from { opacity: 0; transform: scale(0.55) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ─── CAKE SVG ─── */
    .cake-svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
    }

    /* Candle flame animation */
    .flame {
      transform-origin: center bottom;
      animation: flicker 0.9s ease-in-out infinite alternate;
    }
    .flame2 { animation-duration: 0.7s; animation-delay: 0.15s; }
    .flame3 { animation-duration: 1.1s; animation-delay: 0.3s; }

    @keyframes flicker {
      0% { transform: scaleX(1) scaleY(1) rotate(-2deg); opacity: 1; }
      100% { transform: scaleX(0.85) scaleY(1.15) rotate(3deg); opacity: 0.85; }
    }

    /* ─── SORRY MESSAGE ON CAKE ─── */
    .cake-message {
      position: absolute;
      /* Positioned over the middle tier of the cake */
      top: 42%;
      left: 50%;
      transform: translateX(-50%);
      width: 78%;
      text-align: center;
      pointer-events: none;
    }

    .cake-message .sorry-line {
      font-family: 'Pacifico', cursive;
      font-size: clamp(12px, 3.8vw, 18px);
      color: var(--blush);
      text-shadow: 0 1px 4px rgba(60,10,0,0.7);
      line-height: 1.5;
      display: block;
    }

    /* ─── BOTTOM MESSAGE ─── */
    .bottom-message {
      margin-top: 16px;
      padding: 0 28px 32px;
      text-align: center;
      opacity: 0;
      animation: fadeSlideDown 0.7s ease 1.8s forwards;
    }

    .bottom-message p {
      font-size: clamp(14px, 4vw, 18px);
      color: var(--frosting);
      line-height: 1.7;
      font-weight: 700;
    }

    .bottom-message .big-sorry {
      font-family: 'Pacifico', cursive;
      font-size: clamp(28px, 8vw, 48px);
      color: var(--blush);
      display: block;
      margin-bottom: 10px;
      text-shadow: 0 4px 16px rgba(255,100,100,0.3);
      animation: pulseGlow 2s ease-in-out 2.5s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { text-shadow: 0 4px 16px rgba(255,100,100,0.3); }
      50% { text-shadow: 0 4px 30px rgba(255,100,100,0.7), 0 0 60px rgba(255,150,150,0.2); }
    }

    .hearts {
      margin-top: 14px;
      font-size: clamp(24px, 6vw, 36px);
      animation: heartbeat 1.4s ease-in-out 2.8s infinite;
      display: block;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.2); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    /* Stars scattered */
    .star {
      position: fixed;
      color: var(--choc-light);
      font-size: 10px;
      opacity: 0;
      animation: starTwinkle 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 0.4; transform: scale(1); }
    }
  </style>
</head>
<body>

        <circle cx="248" cy="265" r="3" fill="#FFD700"/>

  <!-- Stars background for cake screen -->

  <script>
    // ─── GENERATE PARTICLES (landing) ───
    const particleContainer = document.getElementById('particles');
    const colors = ['#C68642', '#FFD6D6', '#FDEBD0', '#7B3F00', '#A0522D'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 14 + 6;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 8 + 6}s;
        animation-delay: ${Math.random() * 6}s;
      `;
      particleContainer.appendChild(p);
    }

    // ─── GENERATE BACKGROUND STARS (cake screen) ───
    const starsContainer = document.getElementById('stars-container');
    starsContainer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0';
    for (let i = 0; i < 18; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = ['✦','✧','⋆','★'][Math.floor(Math.random() * 4)];
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        animation-delay: ${Math.random() * 4}s;
        animation-duration: ${Math.random() * 3 + 2}s;
      `;
      starsContainer.appendChild(s);
    }

    // ─── DOUBLE TAP DETECTION ───
    const landing = document.getElementById('landing');
    const cakeScreen = document.getElementById('cake-screen');
    let lastTap = 0;
    let tapTimeout = null;

    function createRipple(x, y) {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      const size = 60;
      ripple.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${x - size / 2}px;
        top: ${y - size / 2}px;
      `;
      landing.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);
    }

    function revealCake() {
      landing.classList.add('hidden');
      cakeScreen.classList.add('visible');
    }

    function handleDoubleTap(x, y) {
      const now = Date.now();
      createRipple(x, y);

      if (now - lastTap < 380) {
        // Double tap!
        clearTimeout(tapTimeout);
        revealCake();
      }
      lastTap = now;
    }

    // Touch events (mobile)
    landing.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleDoubleTap(touch.clientX, touch.clientY);
    }, { passive: false });

    // Click fallback (desktop)
    landing.addEventListener('dblclick', (e) => {
      revealCake();
    });

    landing.addEventListener('click', (e) => {
      handleDoubleTap(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
